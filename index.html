<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nico et le TastyCrousty Maléfique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Oswald:wght@300;400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <!-- ═══════════════ LOADING SCREEN ═══════════════ -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="loading-logo">
        <span class="logo-tasty">TASTY</span><span class="logo-crousty">CROUSTY</span>
      </div>
      <div class="loading-subtitle">NE PAS CONSOMMER</div>
      <div class="loading-bar-wrap">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-text" id="loading-text">Initialisation...</div>
    </div>
  </div>

  <!-- ═══════════════ MAIN MENU ═══════════════ -->
  <div id="main-menu" class="screen hidden">
    <canvas id="menu-bg-canvas"></canvas>
    <div class="menu-overlay">
      <div class="menu-title">
        <div class="title-line-1">NICO</div>
        <div class="title-line-2">et le</div>
        <div class="title-line-3">TastyCrousty</div>
        <div class="title-line-4">☠ Maléfique ☠</div>
      </div>
      <nav class="menu-buttons">
        <button class="menu-btn" id="btn-new-game">
          <span class="btn-icon">▶</span> Nouvelle Partie
        </button>
        <button class="menu-btn" id="btn-continue" disabled>
          <span class="btn-icon">↺</span> Continuer
        </button>
        <button class="menu-btn" id="btn-options">
          <span class="btn-icon">⚙</span> Options
        </button>
        <button class="menu-btn" id="btn-quit">
          <span class="btn-icon">✕</span> Quitter
        </button>
      </nav>
      <div class="menu-footer">Un jeu de <strong>STIROXBEREAL</strong> · 2024</div>
    </div>
  </div>

  <!-- ═══════════════ OPTIONS SCREEN ═══════════════ -->
  <div id="options-screen" class="screen hidden">
    <div class="options-panel">
      <h2 class="options-title">OPTIONS</h2>
      <div class="option-row">
        <label>Volume Général</label>
        <input type="range" id="volume-slider" min="0" max="100" value="70">
        <span id="volume-val">70%</span>
      </div>
      <div class="option-row">
        <label>Luminosité</label>
        <input type="range" id="bright-slider" min="20" max="100" value="80">
        <span id="bright-val">80%</span>
      </div>
      <div class="option-row warning-row">
        <span>⚠ Ce jeu contient des images soudaines et des sons forts.</span>
      </div>
      <button class="menu-btn" id="btn-back-options">← Retour</button>
    </div>
  </div>

  <!-- ═══════════════ CINEMATIC SCREEN ═══════════════ -->
  <div id="cinematic-screen" class="screen hidden">
    <canvas id="cinematic-canvas"></canvas>
    <div id="cinematic-text-overlay"></div>
    <button id="cinematic-skip-btn">Passer ▶▶</button>
  </div>

  <!-- ═══════════════ GAME SCREEN ═══════════════ -->
  <div id="game-screen" class="screen hidden">
    <!-- Scene background -->
    <canvas id="scene-canvas"></canvas>

    <!-- HTML scene elements (items, hotspot labels) -->
    <div id="scene-elements"></div>

    <!-- Clickable hotspots -->
    <div id="hotspots-layer"></div>

    <!-- Vignette + atmospheric overlay -->
    <div id="vignette-overlay"></div>
    <div id="flicker-overlay"></div>

    <!-- Chapter title card -->
    <div id="chapter-card" class="chapter-card hidden">
      <div id="chapter-number"></div>
      <div id="chapter-name"></div>
    </div>

    <!-- Location indicator -->
    <div id="location-hud">
      <span id="location-icon">📍</span>
      <span id="location-name">—</span>
    </div>

    <!-- Inventory bar -->
    <div id="inventory-bar">
      <div class="inv-label">INVENTAIRE</div>
      <div id="inv-slots"></div>
    </div>

    <!-- Notes collected indicator -->
    <div id="notes-hud">
      <span id="notes-count">Notes : 0</span>
    </div>

    <!-- Dialog Box -->
    <div id="dialog-box" class="hidden">
      <div id="dialog-portrait-wrap">
        <img id="dialog-portrait" src="" alt="">
        <div id="dialog-portrait-glow"></div>
      </div>
      <div id="dialog-body">
        <div id="dialog-speaker-name"></div>
        <div id="dialog-text-area"></div>
        <button id="dialog-advance">▶ Continuer</button>
      </div>
    </div>

    <!-- Note / Document Reader -->
    <div id="note-reader" class="hidden">
      <div class="note-paper">
        <div id="note-title-area"></div>
        <div id="note-body"></div>
        <button id="note-close-btn">✕ Fermer</button>
      </div>
    </div>

    <!-- Puzzle Overlay -->
    <div id="puzzle-overlay" class="hidden">
      <div id="puzzle-box">
        <div id="puzzle-title"></div>
        <div id="puzzle-content"></div>
        <div id="puzzle-feedback"></div>
        <button id="puzzle-cancel">✕ Annuler</button>
      </div>
    </div>

    <!-- Screamer Overlay -->
    <div id="screamer-overlay" class="hidden">
      <canvas id="screamer-canvas"></canvas>
    </div>

    <!-- Pause Menu -->
    <div id="pause-menu" class="hidden">
      <div class="pause-panel">
        <h3>PAUSE</h3>
        <button class="menu-btn" id="pause-resume">▶ Reprendre</button>
        <button class="menu-btn" id="pause-save">💾 Sauvegarder</button>
        <button class="menu-btn" id="pause-main-menu">🏠 Menu Principal</button>
      </div>
    </div>

    <!-- Pause button -->
    <button id="pause-btn">⏸</button>
  </div>

  <!-- ═══════════════ EPILOGUE SCREEN ═══════════════ -->
  <div id="epilogue-screen" class="screen hidden">
    <div class="epilogue-bg"></div>
    <div class="epilogue-content">
      <div id="epilogue-text"></div>
      <button id="epilogue-advance" class="menu-btn hidden">Continuer →</button>
    </div>
  </div>

  <!-- ═══════════════ CREDITS SCREEN ═══════════════ -->
  <div id="credits-screen" class="screen hidden">
    <div class="credits-bg"></div>
    <div class="credits-wrap">
      <div class="credits-scroll-area" id="credits-scroll">
        <!-- Filled by JS -->
      </div>
    </div>
    <button id="credits-back" class="menu-btn">↩ Menu Principal</button>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="scripts/audio.js"></script>
  <script src="scripts/cinematics.js"></script>
  <script src="scripts/game.js"></script>
</body>
</html>
